# https://docs.railway.com/deploy/config-as-code
#
# WAJIB di Railway → Service → Settings:
#   Root Directory = aurora_backend
# (folder yang berisi Dockerfile + package.json ini)
#
# Build memakai Dockerfile agar Node + npm start konsisten (hindari error Nixpacks).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Langsung `node` — hindari `npm start` (npm yang lapor error saat SIGTERM dari Railway)
startCommand = "node webhook.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
